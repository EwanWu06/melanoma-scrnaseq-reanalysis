name: melanoma-scrnaseq
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # Core single-cell stack
  - scanpy
  - anndata
  - scvi-tools
  - harmonypy        # batch integration (Q2.3); bioconda, pulls cpu pytorch
  - leidenalg
  - louvain
  - python-igraph
  # Scientific Python
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - numba
  - h5py
  - statsmodels
  # Plotting
  - matplotlib
  - seaborn
  # Notebook / dev
  - jupyter
  - jupyterlab
  - ipykernel
  - pip
