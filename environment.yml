name: melanoma-scrnaseq
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # Core single-cell stack
  - scanpy
  - anndata
  - scvi-tools
  - harmonypy        # batch integration (Q2.3); bioconda, pulls cpu pytorch
  - leidenalg
  - louvain
  - python-igraph
  # Scientific Python
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - numba
  - h5py
  - statsmodels
  # Plotting
  - matplotlib
  - seaborn
  # Notebook / dev
  - jupyter
  - jupyterlab
  - ipykernel
  - pip
  # Pip-only (no conda package)
  - pip:
    - bbknn       # Q3.2 batch integration — graph-based BBKNN (Polański et al. 2020)
    - scanorama   # Q3.2 investigated, not adopted — see docs/decision_log.md 2026-05-19 (d)
